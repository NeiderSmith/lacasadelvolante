version: 1
backend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
  # Caché del job de backend (independiente de la del frontend). Prioridad: .npm con npm ci.
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Next ejecuta `tsc` en build; el heap por defecto (~2 GB) puede agotarse en CI.
        - |
          set -e
          export NODE_OPTIONS="--max-old-space-size=6144"
          npx ampx generate outputs --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID"
          npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  # Caché del job de frontend: .next/cache (incremental Next), .npm (tarballs npm ci), node_modules.
  # Con npm ci, el ahorro real suele venir de .npm; node_modules se borra y reinstala, pero Amplify lo sigue guardando entre builds.
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
